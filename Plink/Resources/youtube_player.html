<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }
        #player {
            width: 100%;
            height: 100%;
            border: 0;
        }
    </style>
</head>
<body>
    <!--
      🔧 v30.1 (July 2026): YouTube IFrame API player with plinkBridge.
      Loaded via WKWebView.loadHTMLString(_, baseURL: https://plink.app).

      Protocol (window.webkit.messageHandlers.plinkBridge.postMessage):
        { event: "ready" }                                  — player ready
        { event: "stateChange", state: INT, currentTime: N } — state change
        { event: "error", code: INT }                        — player error

      Commands (callable from Swift via evaluateJavaScript):
        playVideo()   — resume playback
        pauseVideo()  — pause
        seekTo(N)     — seek to N seconds
        getCurrentTime() → returns Double
    -->
    <div id="player"></div>

    <script>
        // 🔧 v30.1: Official YouTube IFrame API script.
        // Per YouTube docs: https://www.youtube.com/iframe_api
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        var player;
        var VIDEO_ID = "%VIDEO_ID%";

        // Called automatically by the IFrame API when ready
        window.onYouTubeIframeAPIReady = function() {
            console.log("[Plink] YouTube IFrame API ready, creating player for videoId=" + VIDEO_ID);
            player = new YT.Player('player', {
                height: '100%',
                width: '100%',
                videoId: VIDEO_ID,
                playerVars: {
                    'playsinline': 1,
                    'controls': 0,            // hide native controls — Plink UI overlays
                    'rel': 0,
                    'modestbranding': 1,
                    'iv_load_policy': 3,
                    'origin': 'https://plink.app',
                    'widget_referrer': 'https://plink.app',
                    'enablejsapi': 1
                },
                events: {
                    'onReady': onPlayerReady,
                    'onError': onPlayerError,
                    'onStateChange': onPlayerStateChange
                }
            });
        };

        function onPlayerReady(event) {
            console.log("[Plink] Player ready — calling playVideo()");
            // iOS blocks unmuted autoplay. Mute first, then play.
            event.target.mute();
            event.target.playVideo();

            // Notify Swift that player is ready
            sendBridge({ "event": "ready" });
        }

        function onPlayerError(event) {
            // Error codes: 2=invalid param, 5=HTML5 error, 100=not found,
            // 101/150=embedding disabled. 153 is iOS-specific (config error).
            console.error("[Plink] Player error code: " + event.data);
            sendBridge({ "event": "error", "code": event.data });
        }

        function onPlayerStateChange(event) {
            // YT.PlayerState: -1=unstarted, 0=ended, 1=playing, 2=paused, 3=buffering, 5=cued
            console.log("[Plink] Player state: " + event.data);

            var currentTime = 0;
            if (player && player.getCurrentTime) {
                currentTime = player.getCurrentTime();
            }
            sendBridge({
                "event": "stateChange",
                "state": event.data,
                "currentTime": currentTime
            });
        }

        // 🔧 Helper: send message to Swift via plinkBridge
        function sendBridge(payload) {
            try {
                window.webkit.messageHandlers.plinkBridge.postMessage(payload);
            } catch(e) {
                console.log("[Plink] plinkBridge not available: " + e);
            }
        }

        // 🔧 v30.1: Commands callable from Swift via webView.evaluateJavaScript
        window.playVideo = function() {
            if (player) player.playVideo();
        };
        window.pauseVideo = function() {
            if (player) player.pauseVideo();
        };
        window.seekTo = function(seconds) {
            if (player) player.seekTo(seconds, true);
        };
        window.getCurrentTime = function() {
            return player ? player.getCurrentTime() : 0;
        };
    </script>
</body>
</html>
