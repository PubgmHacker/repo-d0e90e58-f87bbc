<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }
        #player {
            width: 100%;
            height: 100%;
            border: 0;
        }
        /* 🔧 v31.2: CSS for fallback (when iframe redirects to full youtube.com/watch).
           Hides YouTube's UI elements, keeping only the video element.
           These selectors only affect the iframe content when it's loaded from
           youtube.com/watch (not from youtube.com/embed/...). */
        #player[src*="watch"] {
            width: 100vw !important;
            height: 100vh !important;
        }
    </style>
</head>
<body>
    <!--
      🔧 v31 (July 2026): Plain <iframe> embed (NOT IFrame API).
      Reason: IFrame API gave error 150 (embedding restricted) for videos
      like Gumball that ARE NOT actually embedding-restricted (they played
      fine when WKWebView navigated to m.youtube.com/watch).

      Insight: a plain <iframe src="youtube.com/embed/ID"> is treated
      differently by YouTube than the IFrame API. The IFrame API does
      strict permission checks; the plain iframe just loads the player
      page directly. This is the same pattern used by countless websites
      that embed YouTube videos.

      The <video> element inside the iframe will be created by YouTube's
      own player.js — we just observe state changes via postMessage from
      a tiny observer script.

      NOTE: %VIDEO_ID% placeholder is replaced at runtime.
    -->
    <iframe
        id="player"
        src="https://www.youtube.com/embed/%VIDEO_ID%?playsinline=1&rel=0&modestbranding=1&iv_load_policy=3&autoplay=1&mute=1&enablejsapi=1"
        allow="autoplay; encrypted-media; fullscreen"
        referrerpolicy="strict-origin-when-cross-origin"
        allowfullscreen>
    </iframe>

    <script>
        // 🔧 v31: Observer script — polls the iframe's player state via
        // YouTube's postMessage API. The iframe exposes YT.Player events
        // via window.postMessage with JSON payloads starting with 'ytPlayer'.
        var lastState = -2;
        var lastTime = -1;

        function sendBridge(payload) {
            try {
                window.webkit.messageHandlers.plinkBridge.postMessage(payload);
            } catch(e) {
                console.log("[Plink] plinkBridge not available: " + e);
            }
        }

        // Listen for YouTube's postMessage events from the iframe
        window.addEventListener("message", function(event) {
            try {
                if (typeof event.data === "string" && event.data.startsWith("{")) {
                    var data = JSON.parse(event.data);
                    // YouTube IFrame postMessage format varies — handle both
                    if (data.event === "onReady") {
                        console.log("[Plink] Player ready (via postMessage)");
                        sendBridge({ "event": "ready" });
                    }
                    if (data.event === "onStateChange") {
                        console.log("[Plink] Player state: " + data.info);
                        sendBridge({ "event": "stateChange", "state": data.info });
                    }
                    if (data.event === "onError") {
                        console.log("[Plink] Player error: " + data.info);
                        sendBridge({ "event": "error", "code": data.info });
                    }
                }
            } catch(e) {
                // Ignore non-JSON messages
            }
        });

        // 🔧 v31: Fallback polling — some YouTube embeds don't post messages
        // unless explicitly told to. We try to access the iframe's player
        // via the IFrame API (which we load here too for control purposes).
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        var ytPlayer;
        window.onYouTubeIframeAPIReady = function() {
            console.log("[Plink] IFrame API ready, attaching to existing iframe");
            ytPlayer = new YT.Player('player', {
                events: {
                    'onReady': function(event) {
                        console.log("[Plink] Player ready (via IFrame API)");
                        sendBridge({ "event": "ready" });
                    },
                    'onStateChange': function(event) {
                        var currentTime = 0;
                        try { currentTime = ytPlayer.getCurrentTime() || 0; } catch(e) {}
                        console.log("[Plink] State: " + event.data + ", time: " + currentTime);
                        sendBridge({
                            "event": "stateChange",
                            "state": event.data,
                            "currentTime": currentTime
                        });
                    },
                    'onError': function(event) {
                        console.log("[Plink] Player error: " + event.data);
                        sendBridge({ "event": "error", "code": event.data });

                        // 🔧 v31.2 (July 2026): Fallback for embedding-restricted videos.
                        // Codes 101/150 = video owner disabled embedding. Since the
                        // embed is blocked, redirect the iframe to the FULL mobile
                        // watch page. YouTube allows playback of these videos on
                        // their own pages (no embedding restriction check) — same
                        // trick Rave uses.
                        //
                        // We replace the iframe src with youtube.com/watch?v=ID which
                        // loads the full YouTube page inside the iframe. CSS in this
                        // HTML hides YouTube's UI, keeping only the video element.
                        if (event.data === 101 || event.data === 150) {
                            console.log("[Plink] Embedding restricted (code=" + event.data + "), falling back to full mobile page");
                            var fallbackUrl = "https://www.youtube.com/watch?v=" + VIDEO_ID + "&app=desktop";
                            try {
                                // Replace the iframe src — this navigates the iframe
                                // to the full YouTube watch page.
                                var iframe = document.getElementById('player');
                                if (iframe) {
                                    iframe.src = fallbackUrl;
                                    console.log("[Plink] Fallback: iframe.src = " + fallbackUrl);
                                }
                            } catch(e) {
                                console.log("[Plink] Fallback error: " + e);
                            }
                        }
                    }
                }
            });
        };

        // 🔧 v31: Bridge commands (callable from Swift via evaluateJavaScript)
        window.playVideo = function() {
            if (ytPlayer) ytPlayer.playVideo();
        };
        window.pauseVideo = function() {
            if (ytPlayer) ytPlayer.pauseVideo();
        };
        window.seekTo = function(seconds) {
            if (ytPlayer) ytPlayer.seekTo(seconds, true);
        };
        window.getCurrentTime = function() {
            return ytPlayer ? ytPlayer.getCurrentTime() : 0;
        };
    </script>
</body>
</html>
