name: Plink
options:
  bundleIdPrefix: com.syncwatch
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  groupSortPosition: top

# PATCH 07: LiveKit Swift SDK — official SFU client for voice/video chat.
# Per runbook §9: SFU required for rooms > 4 participants (mesh fallback
# only for <= 4). LiveKit SDK provides Room, Participant, Track, and
# DataChannel APIs that RoomRTCController wraps.
#
# PATCH 15 + P0 voice: LiveKit re-enabled.
# Note: On first enable, Xcode/SPM will download WebRTC (~large). Use stable
# connection or pre-cache. If network fails, fall back to Agora/Daily.co.
packages:
  LiveKit:
    url: https://github.com/livekit/client-sdk-swift
    from: 2.0.0
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk
    from: 10.0.0

settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: "2QAMUC4Z4P"
    CODE_SIGN_STYLE: Automatic
    TARGETED_DEVICE_FAMILY: "1,2"
    SWIFT_VERSION: "5.9"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    OTHER_LDFLAGS: ""

targets:
  Plink:
    type: application
    platform: iOS
    sources:
      - path: Plink
        excludes:
          - "**/.DS_Store"
      - path: Plink/Resources/Info.plist
        buildPhase: none
    resources:
      - path: Plink/Resources
        excludes:
          - "**/.DS_Store"
    # PATCH 15: LiveKit dependency disabled — see comment at top of file.
    # dependencies:
    #   - package: LiveKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.syncwatch.plink
        INFOPLIST_FILE: Plink/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Plink/Resources/Plink.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        DEVELOPMENT_TEAM: "2QAMUC4Z4P"
        CODE_SIGN_IDENTITY: "Apple Development"
        SUPPORTS_MACCATALYST: NO
    dependencies:
      - package: LiveKit
      - package: Firebase
        product: FirebaseAnalytics
      - package: Firebase
        product: FirebaseCrashlytics
    info:
      path: Plink/Resources/Info.plist
      properties:
        CFBundleDisplayName: Плинк
        UILaunchScreen:
          UIColorName: raveBackground
        UIRequiresFullScreen: false
        UIBackgroundModes:
          - audio
          - picture-in-picture
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    entitlements:
      path: Plink/Resources/Plink.entitlements

  PlinkTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: PlinkTests
    dependencies:
      - target: Plink
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.syncwatch.plink.tests
        DEVELOPMENT_TEAM: "2QAMUC4Z4P"
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: PlinkTests
