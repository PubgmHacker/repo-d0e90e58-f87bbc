name: Build Plink Desktop (Mac + Windows)

on:
  push:
    tags:
      - 'desktop-v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            name: macos-arm64
          - platform: macos-latest
            target: x86_64-apple-darwin
            name: macos-intel
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            name: windows-x64

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^1.5" --locked

      - name: Install JS deps
        working-directory: windows-client
        run: npm ci

      - name: Build Tauri
        working-directory: windows-client
        run: npm run tauri:build -- --target ${{ matrix.target }}

      - name: Upload Mac artifacts
        if: matrix.platform == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: plink-${{ matrix.name }}
          path: |
            windows-client/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            windows-client/src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app

      - name: Upload Windows artifacts
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: plink-${{ matrix.name }}
          path: |
            windows-client/src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
            windows-client/src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi