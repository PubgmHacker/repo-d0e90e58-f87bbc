name: Build Windows .exe

on:
  push:
    tags:
      - 'windows-v*'
      - 'desktop-v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: windows-client

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      # Project uses Tauri 1.x (see package.json @tauri-apps/cli)
      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^1.6" --locked

      - name: Install JS deps
        run: npm ci

      - name: Build web + Tauri NSIS
        run: npm run tauri:build
        env:
          CI: true

      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: plink-windows-x64
          path: |
            windows-client/src-tauri/target/release/bundle/nsis/*.exe
            windows-client/src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error
