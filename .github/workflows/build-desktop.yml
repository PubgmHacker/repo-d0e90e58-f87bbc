name: Build Plink Desktop (Mac + Windows)

on:
  push:
    tags:
      - 'desktop-v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            name: macos-arm64
          - platform: macos-latest
            target: x86_64-apple-darwin
            name: macos-intel
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            name: windows-x64

    runs-on: ${{ matrix.platform }}
    defaults:
      run:
        working-directory: windows-client

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: windows-client/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: windows-client/src-tauri -> target
          key: ${{ matrix.target }}

      - name: Install JS deps
        run: npm ci

      # Prefer local @tauri-apps/cli from package.json (no cargo install)
      - name: Build Tauri
        run: npx tauri build --target ${{ matrix.target }}
        env:
          CI: true

      - name: Upload Mac artifacts
        if: matrix.platform == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: plink-${{ matrix.name }}
          path: |
            windows-client/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            windows-client/src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app
          if-no-files-found: warn

      - name: Upload Windows artifacts
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: plink-${{ matrix.name }}
          path: |
            windows-client/src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
            windows-client/src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
          if-no-files-found: error
