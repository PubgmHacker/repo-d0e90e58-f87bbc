name: Build Windows .exe

on:
  push:
    tags:
      - 'windows-v*'
      - 'desktop-v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: windows-client

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: windows-client/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: windows-client/src-tauri -> target

      # Use project-local @tauri-apps/cli (1.x) — do NOT cargo install (too slow / stuck)
      - name: Install JS deps
        run: npm ci

      - name: Build NSIS installer
        run: npm run tauri:build
        env:
          CI: true

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: plink-windows-x64
          path: |
            windows-client/src-tauri/target/release/bundle/nsis/*.exe
            windows-client/src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error
