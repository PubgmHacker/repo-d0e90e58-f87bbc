name: Plink
options:
  bundleIdPrefix: com.syncwatch
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: "2QAMUC4Z4P"
    CODE_SIGN_STYLE: Automatic
    TARGETED_DEVICE_FAMILY: "1,2"
    SWIFT_VERSION: "5.9"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    OTHER_LDFLAGS: ""

targets:
  Plink:
    type: application
    platform: iOS
    sources:
      - path: Plink
        excludes:
          - "**/.DS_Store"
      - path: Plink/Vendors/XCDYouTubeKit
        type: folder
      - path: Plink/Resources/Info.plist
        buildPhase: none
    resources:
      - path: Plink/Resources
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.syncwatch.plink
        INFOPLIST_FILE: Plink/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Plink/Resources/Plink.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        DEVELOPMENT_TEAM: "2QAMUC4Z4P"
        CODE_SIGN_IDENTITY: "Apple Development"
        SUPPORTS_MACCATALYST: NO
        SWIFT_OBJC_BRIDGING_HEADER: Plink/Plink-Bridging-Header.h
    info:
      path: Plink/Resources/Info.plist
      properties:
        CFBundleDisplayName: Плинк
        UILaunchScreen:
          UIColorName: raveBackground
        UIRequiresFullScreen: false
        UIBackgroundModes:
          - audio
          - picture-in-picture
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    entitlements:
      path: Plink/Resources/Plink.entitlements
