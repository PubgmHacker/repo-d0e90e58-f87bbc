name: Plink
options:
  bundleIdPrefix: com.syncwatch
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  groupSortPosition: top

# PATCH 07: LiveKit Swift SDK — official SFU client for voice/video chat.
# Per runbook §9: SFU required for rooms > 4 participants (mesh fallback
# only for <= 4). LiveKit SDK provides Room, Participant, Track, and
# DataChannel APIs that RoomRTCController wraps.
#
# PATCH 15: LiveKit SPM dependency temporarily disabled for builds without
# reliable network (SPM fetch of WebRTC ~500MB fails on slow/unstable
# connections). Re-enable by uncommenting the packages block below AND
# the `- package: LiveKit` line in targets.Plink.dependencies AND removing
# the `#if canImport(LiveKit)` guards in:
#   - Plink/RTC/RoomRTCController.swift
#   - Plink/RTC/ParticipantVideoView.swift
# When LiveKit is re-enabled, voice/video chat works. Without it, the app
# builds and all non-RTC features work (playback, chat, danmaku, reactions,
# ambient, billing, admin, Rutube).
# packages:
#   LiveKit:
#     url: https://github.com/livekit/client-sdk-swift
#     from: 2.0.0

settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: "2QAMUC4Z4P"
    CODE_SIGN_STYLE: Automatic
    TARGETED_DEVICE_FAMILY: "1,2"
    SWIFT_VERSION: "5.9"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    OTHER_LDFLAGS: ""

targets:
  Plink:
    type: application
    platform: iOS
    sources:
      - path: Plink
        excludes:
          - "**/.DS_Store"
      - path: Plink/Resources/Info.plist
        buildPhase: none
    resources:
      - path: Plink/Resources
        excludes:
          - "**/.DS_Store"
    # PATCH 15: LiveKit dependency disabled — see comment at top of file.
    # dependencies:
    #   - package: LiveKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.syncwatch.plink
        INFOPLIST_FILE: Plink/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Plink/Resources/Plink.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        DEVELOPMENT_TEAM: "2QAMUC4Z4P"
        CODE_SIGN_IDENTITY: "Apple Development"
        SUPPORTS_MACCATALYST: NO
    info:
      path: Plink/Resources/Info.plist
      properties:
        CFBundleDisplayName: Плинк
        UILaunchScreen:
          UIColorName: raveBackground
        UIRequiresFullScreen: false
        UIBackgroundModes:
          - audio
          - picture-in-picture
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    entitlements:
      path: Plink/Resources/Plink.entitlements

  PlinkTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: PlinkTests
    dependencies:
      - target: Plink
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.syncwatch.plink.tests
        DEVELOPMENT_TEAM: "2QAMUC4Z4P"
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: PlinkTests
